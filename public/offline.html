<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#F5A623" />
  <title>CityTaxi - Nema interneta</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #f0f0f0;
      padding: 24px;
      text-align: center;
    }
    .icon {
      font-size: 72px;
      margin-bottom: 24px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.95); }
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #F5A623;
    }
    p {
      font-size: 16px;
      color: rgba(240, 240, 240, 0.7);
      max-width: 320px;
      line-height: 1.5;
      margin-bottom: 8px;
    }
    .retry-btn {
      margin-top: 32px;
      padding: 16px 48px;
      font-size: 18px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      background: #F5A623;
      color: #1a1a2e;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .retry-btn:active { transform: scale(0.95); opacity: 0.9; }
    .status-dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #ef4444;
      margin-right: 8px;
      animation: blink 1.5s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .status {
      margin-top: 24px;
      font-size: 14px;
      color: rgba(240, 240, 240, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>Nema internet konekcije</h1>
  <p>Proverite Wi-Fi ili mobilne podatke i pokušajte ponovo.</p>
  <p>Aplikacija će se automatski povezati kada internet bude dostupan.</p>
  <button class="retry-btn" onclick="window.location.reload()">🔄 Pokušaj ponovo</button>
  <div class="status"><span class="status-dot"></span> Offline</div>
  <script>
    window.addEventListener('online', () => window.location.reload());
  </script>
</body>
</html>
